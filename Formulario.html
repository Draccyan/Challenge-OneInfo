<style>

.container {
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    font-family: Arial, sans-serif;
    border: 1px solid #ddd;
    border-radius: 8px;
    background-color: #f9f9f9;
}

.form-row {
    display: flex;
    gap: 20px; /* espacio entre campos */
    margin-bottom: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
    flex: 1; /* el mismo ancho campos*/
}

/* estilo para el campo mail */
.full-width {
    flex: 1;
}

label {
    font-weight: bold;
    margin-bottom: 5px;
    font-size: 0.9em;
}

input, select {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1em;
}

/* btn */
.botones {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}

.btn-primario { background-color: #007bff; color: white; }
.btn-secundario { background-color: #6c757d; color: white; }

.input-error {
    border: 2px solid #dc3545 !important;
    background-color: #fff8f8;
}

</style>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Rellene los campos</h2>

    <form id="form" class="container">

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan" />
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" placeholder="Ej: Perez"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dni">DNI</label>
          <input type="text" id="dni" name="dni" placeholder="Ej: 99999999" />
        </div>
        <div class="form-group">
          <label for="sexo">Sexo</label>
          <select id="sexo" name="sexo">
            <option value="" disabled selected>Seleccione...</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label for="mail">Email</label>
          <input type="text" id="mail" name="mail" placeholder="Ej: usuario@correo.com"/>
        </div>
      </div>

      <div class="botones">
        <button type="button" id="btnCancelar" class="btn-secundario"> Cancelar </button>
        <button type="button" id="btnEnviar" class="btn-primario"> Enviar </button>
      </div>

    </form>

  </body>
</html>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("form");
    const btnEnviar = document.getElementById("btnEnviar");
    const btnCancelar = document.getElementById("btnCancelar");

    // Funcion para limpiar campos (btn cancelar)
    btnCancelar.addEventListener("click", () => {
      form.reset();
    });

    // Funcion principal de envío
    btnEnviar.addEventListener("click", async () => {
      // 1. Obtencion de campos
      const datos = {
        nombre: document.getElementById("nombre").value.trim(),
        apellido: document.getElementById("apellido").value.trim(),
        dni: document.getElementById("dni").value.trim(),
        sexo: document.getElementById("sexo").value,
        mail: document.getElementById("mail").value.trim(),
      };

      // 2. Validaciones
      if (!datos.nombre) return errorValidacion("Ingrese el nombre", "nombre");
      if (!datos.apellido)
        return errorValidacion("Ingrese el apellido", "apellido");

      // Validación DNI
      if (!datos.dni || isNaN(datos.dni)) {
        return errorValidacion("El DNI debe ser un valor numérico", "dni");
      }

      // Validacion combo
      if (!datos.sexo) return errorValidacion("Seleccione el sexo", "sexo");

      // Validacion mail
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(datos.mail)) {
        return errorValidacion("Ingrese un mail con formato válido", "mail");
      }

      // 3. Envío con Fetch
      try {
        const response = await fetch(
          "https://tu-futuro-backend.com/api/usuarios",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(datos),
          },
        );

        const resultado = await response.json();
        console.log("Respuesta del back:", resultado);
        alert("Datos enviados con exito");
      } catch (error) {
        // Captura de excepcion al enviar
        console.error("Error en la peticion:", error);
        alert("Error al conectar con el back: " + error.message);
      }
    });

    function errorValidacion(mensaje, idCampo) {
      const campo = document.getElementById(idCampo);

      alert(mensaje);

      campo.classList.add("input-error");
      campo.focus();

      //Le remarco el campo con error en rojo
      campo.addEventListener(
        "input",
        () => {
          campo.classList.remove("input-error");
        },
        { once: true },
      );

      return false;
    }
  });
</script>
